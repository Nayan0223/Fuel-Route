<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuel Route</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f6f8;
        color: #111827;
      }
      header {
        padding: 16px 20px;
        background: #1f2937;
        color: #fff;
      }
      header h1 {
        margin: 0;
        font-size: 20px;
      }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        min-height: calc(100vh - 56px);
      }
      aside {
        padding: 20px;
        background: #fff;
        border-right: 1px solid #d1d5db;
        overflow-y: auto;
        max-height: calc(100vh - 56px);
      }
      label {
        display: block;
        margin-top: 12px;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
      }
      input,
      button {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      button {
        margin-top: 16px;
        background: #2563eb;
        color: #fff;
        border: 0;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #1d4ed8;
      }
      button:disabled {
        background: #93c5fd;
        cursor: wait;
      }
      #map {
        height: calc(100vh - 56px);
      }
      #results {
        margin-top: 20px;
      }
      .placeholder {
        margin-top: 20px;
        padding: 16px;
        background: #f9fafb;
        border: 1px dashed #d1d5db;
        border-radius: 10px;
        color: #6b7280;
        font-size: 14px;
        text-align: center;
      }
      .error {
        margin-top: 20px;
        padding: 12px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
        color: #b91c1c;
        font-size: 14px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .stat-card {
        padding: 12px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
      }
      .stat-card.highlight {
        grid-column: 1 / -1;
        background: #eff6ff;
        border-color: #bfdbfe;
      }
      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7280;
        margin-bottom: 4px;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 700;
        color: #111827;
      }
      .stat-value.cost {
        color: #1d4ed8;
        font-size: 24px;
      }
      .section-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 700;
        color: #374151;
      }
      .stop-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .stop-card {
        padding: 12px;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-left: 4px solid #f59e0b;
        border-radius: 10px;
      }
      .stop-header {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .stop-number {
        font-size: 11px;
        font-weight: 700;
        color: #b45309;
        text-transform: uppercase;
      }
      .stop-mile {
        font-size: 12px;
        color: #6b7280;
      }
      .stop-name {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .stop-location {
        font-size: 12px;
        color: #4b5563;
        margin-bottom: 8px;
      }
      .stop-details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        font-size: 12px;
      }
      .detail-item {
        padding: 6px 8px;
        background: rgba(255, 255, 255, 0.7);
        border-radius: 6px;
      }
      .detail-label {
        display: block;
        color: #6b7280;
        font-size: 10px;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .detail-value {
        font-weight: 700;
        color: #111827;
      }
      .field {
        position: relative;
      }
      .coords {
        margin: 6px 0 0;
        font-size: 12px;
        color: #2563eb;
        font-weight: 600;
      }
      .coords.empty {
        color: #9ca3af;
        font-weight: 500;
      }
      .suggestions {
        list-style: none;
        margin: 4px 0 0;
        padding: 0;
        position: absolute;
        left: 0;
        right: 0;
        z-index: 1000;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        max-height: 220px;
        overflow-y: auto;
      }
      .suggestions.hidden {
        display: none;
      }
      .suggestion-item {
        padding: 10px 12px;
        cursor: pointer;
        border-bottom: 1px solid #f3f4f6;
        font-size: 14px;
      }
      .suggestion-item:last-child {
        border-bottom: 0;
      }
      .suggestion-item:hover,
      .suggestion-item.active {
        background: #eff6ff;
      }
      .suggestion-city {
        font-weight: 600;
        color: #111827;
      }
      .suggestion-meta {
        margin-top: 2px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Fuel Route</h1>
      <p style="margin: 6px 0 0; font-size: 13px; opacity: 0.85;">USA cities only</p>
    </header>
    <main>
      <aside>
        <div class="field">
          <label for="start">Start (USA city)</label>
          <input
            id="start"
            type="text"
            autocomplete="off"
            placeholder="Search USA city..."
          />
          <ul id="start-suggestions" class="suggestions hidden"></ul>
          <p id="start-coords" class="coords empty">Coordinates not selected</p>
        </div>

        <div class="field">
          <label for="finish">Finish (USA city)</label>
          <input
            id="finish"
            type="text"
            autocomplete="off"
            placeholder="Search USA city..."
          />
          <ul id="finish-suggestions" class="suggestions hidden"></ul>
          <p id="finish-coords" class="coords empty">Coordinates not selected</p>
        </div>

        <button id="load">Load Route</button>
        <div id="results">
          <div class="placeholder">Click Load Route to see trip summary and fuel stops.</div>
        </div>
      </aside>
      <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([39.5, -98.35], 4);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      let layerGroup = L.layerGroup().addTo(map);
      const locationState = {
        start: { lat: null, lng: null },
        finish: { lat: null, lng: null },
      };

      function formatMoney(value) {
        return `$${Number(value).toFixed(2)}`;
      }

      function formatNumber(value, digits = 2) {
        return Number(value).toFixed(digits);
      }

      function renderResults(data) {
        const summary = data.fuel_summary || {};
        const stops = data.fuel_stops || [];
        const distance = data.route?.properties?.distance_miles ?? summary.total_distance_miles;

        const stopCards = stops
          .map(
            (stop, index) => `
              <article class="stop-card">
                <div class="stop-header">
                  <span class="stop-number">Stop ${index + 1}</span>
                  <span class="stop-mile">Mile ${formatNumber(stop.route_mile, 0)}</span>
                </div>
                <div class="stop-name">${stop.name}</div>
                <div class="stop-location">${stop.city}, ${stop.state}</div>
                <div class="stop-details">
                  <div class="detail-item">
                    <span class="detail-label">Price</span>
                    <span class="detail-value">${formatMoney(stop.retail_price)}/gal</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Gallons</span>
                    <span class="detail-value">${formatNumber(stop.gallons_purchased)}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Segment cost</span>
                    <span class="detail-value">${formatMoney(stop.segment_cost_usd)}</span>
                  </div>
                  <div class="detail-item">
                    <span class="detail-label">Station ID</span>
                    <span class="detail-value">${stop.opis_id}</span>
                  </div>
                </div>
              </article>
            `
          )
          .join("");

        document.getElementById("results").innerHTML = `
          <section class="summary-grid">
            <div class="stat-card highlight">
              <div class="stat-label">Total fuel cost</div>
              <div class="stat-value cost">${formatMoney(summary.total_cost_usd || 0)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Distance</div>
              <div class="stat-value">${formatNumber(distance, 0)} mi</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Fuel stops</div>
              <div class="stat-value">${summary.fuel_stops_count || stops.length}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Gallons used</div>
              <div class="stat-value">${formatNumber(summary.total_gallons_consumed || 0)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Gallons bought</div>
              <div class="stat-value">${formatNumber(summary.gallons_purchased || 0)}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Avg price</div>
              <div class="stat-value">${formatMoney(summary.average_price_per_gallon || 0)}/gal</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">MPG</div>
              <div class="stat-value">${summary.mpg || 10}</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Max range</div>
              <div class="stat-value">${summary.max_range_miles || 500} mi</div>
            </div>
          </section>

          <h2 class="section-title">Fuel stops along route</h2>
          <div class="stop-list">
            ${stopCards || '<div class="placeholder">No fuel stops needed for this trip.</div>'}
          </div>
        `;
      }

      function renderError(message) {
        document.getElementById("results").innerHTML = `<div class="error">${message}</div>`;
      }

      function formatCoords(lat, lng) {
        return `${Number(lat).toFixed(4)}, ${Number(lng).toFixed(4)}`;
      }

      function setLocationCoords(field, lat, lng, label = "") {
        locationState[field] = { lat, lng };
        const coordsEl = document.getElementById(`${field}-coords`);
        coordsEl.textContent = `Coordinates: ${formatCoords(lat, lng)}`;
        coordsEl.classList.remove("empty");
        if (label) {
          document.getElementById(field).value = label;
        }
      }

      function clearLocationCoords(field) {
        locationState[field] = { lat: null, lng: null };
        const coordsEl = document.getElementById(`${field}-coords`);
        coordsEl.textContent = "Coordinates not selected";
        coordsEl.classList.add("empty");
      }

      function getLocationValue(field) {
        const stored = locationState[field];
        if (stored.lat !== null && stored.lng !== null) {
          return formatCoords(stored.lat, stored.lng);
        }
        return document.getElementById(field).value.trim();
      }

      function setupCityAutocomplete(field) {
        const input = document.getElementById(field);
        const list = document.getElementById(`${field}-suggestions`);
        let debounceTimer = null;
        let activeIndex = -1;
        let currentResults = [];

        function hideSuggestions() {
          list.classList.add("hidden");
          list.innerHTML = "";
          activeIndex = -1;
          currentResults = [];
        }

        function renderSuggestions(results) {
          currentResults = results;
          if (!results.length) {
            hideSuggestions();
            return;
          }

          list.innerHTML = results
            .map(
              (item, index) => `
                <li
                  class="suggestion-item"
                  data-index="${index}"
                  role="option"
                >
                  <div class="suggestion-city">${item.label}, USA</div>
                  <div class="suggestion-meta">${formatCoords(item.latitude, item.longitude)}</div>
                </li>
              `
            )
            .join("");
          list.classList.remove("hidden");
        }

        function selectSuggestion(index) {
          const item = currentResults[index];
          if (!item) return;
          setLocationCoords(field, item.latitude, item.longitude, item.label);
          hideSuggestions();
        }

        async function fetchSuggestions(query) {
          const response = await fetch(`/api/cities/?q=${encodeURIComponent(query)}`);
          const data = await response.json();
          renderSuggestions(data.results || []);
        }

        input.addEventListener("input", () => {
          clearLocationCoords(field);
          const query = input.value.trim();
          clearTimeout(debounceTimer);
          if (query.length < 2) {
            hideSuggestions();
            return;
          }
          debounceTimer = setTimeout(() => fetchSuggestions(query), 250);
        });

        input.addEventListener("keydown", (event) => {
          if (list.classList.contains("hidden")) return;

          if (event.key === "ArrowDown") {
            event.preventDefault();
            activeIndex = Math.min(activeIndex + 1, currentResults.length - 1);
          } else if (event.key === "ArrowUp") {
            event.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
          } else if (event.key === "Enter" && activeIndex >= 0) {
            event.preventDefault();
            selectSuggestion(activeIndex);
            return;
          } else if (event.key === "Escape") {
            hideSuggestions();
            return;
          } else {
            return;
          }

          list.querySelectorAll(".suggestion-item").forEach((item, index) => {
            item.classList.toggle("active", index === activeIndex);
          });
        });

        list.addEventListener("click", (event) => {
          const item = event.target.closest(".suggestion-item");
          if (!item) return;
          selectSuggestion(Number(item.dataset.index));
        });

        document.addEventListener("click", (event) => {
          if (!event.target.closest(`#${field}`) && !event.target.closest(`#${field}-suggestions`)) {
            hideSuggestions();
          }
        });
      }

      async function loadRoute() {
        const button = document.getElementById("load");
        const start = getLocationValue("start");
        const finish = getLocationValue("finish");

        if (!start || !finish) {
          renderError("Please select both start and finish USA cities.");
          return;
        }

        if (locationState.start.lat === null || locationState.finish.lat === null) {
          renderError("Please select a city from the USA suggestions list.");
          return;
        }

        button.disabled = true;
        button.textContent = "Loading...";

        try {
          const response = await fetch(
            `/api/route/?start=${encodeURIComponent(start)}&finish=${encodeURIComponent(finish)}`
          );
          const data = await response.json();

          if (!response.ok) {
            renderError(data.error || "Could not load route.");
            return;
          }

          renderResults(data);

          layerGroup.clearLayers();
          const geojson = L.geoJSON(data.map, {
            style: (feature) => {
              if (feature.properties.kind === "route") {
                return { color: "#2563eb", weight: 4 };
              }
              return {};
            },
            pointToLayer: (feature, latlng) => {
              const kind = feature.properties.kind;
              if (kind === "fuel_stop") {
                return L.circleMarker(latlng, {
                  radius: 8,
                  color: "#b45309",
                  fillColor: "#f59e0b",
                  fillOpacity: 0.9,
                });
              }
              if (kind === "start") {
                return L.circleMarker(latlng, {
                  radius: 7,
                  color: "#166534",
                  fillColor: "#22c55e",
                  fillOpacity: 1,
                });
              }
              if (kind === "finish") {
                return L.circleMarker(latlng, {
                  radius: 7,
                  color: "#991b1b",
                  fillColor: "#ef4444",
                  fillOpacity: 1,
                });
              }
              return L.marker(latlng);
            },
            onEachFeature: (feature, layer) => {
              if (feature.properties.kind === "fuel_stop") {
                layer.bindPopup(
                  `<strong>${feature.properties.name}</strong><br>${feature.properties.city}, ${feature.properties.state}<br>${formatMoney(feature.properties.retail_price)}/gal`
                );
              }
            },
          });
          layerGroup.addLayer(geojson);
          map.fitBounds(geojson.getBounds(), { padding: [30, 30] });
        } catch (error) {
          renderError("Network error. Is the server running?");
        } finally {
          button.disabled = false;
          button.textContent = "Load Route";
        }
      }

      document.getElementById("load").addEventListener("click", loadRoute);
      setupCityAutocomplete("start");
      setupCityAutocomplete("finish");

      setLocationCoords("start", 40.7128, -74.006, "New York, NY");
      setLocationCoords("finish", 34.0522, -118.2437, "Los Angeles, CA");
    </script>
  </body>
</html>
